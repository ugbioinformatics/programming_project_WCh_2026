{% extends "base.html" %}
{% block content %}
<h1>Usuwanie</h1>
<form action="" method="post">{% csrf_token %}

	{% if all %}
	<p>Czy na pewno chcesz usunąć wszystkie posty ({{ count }})"?</p>
	{% else %}
	<p>Czy na pewno chcesz usunąć "{{ post.title }}"?</p>
	{% endif %}

	<input type="submit" value="Confirm">
</form>
{% endblock content %}
