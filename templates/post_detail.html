{% extends "base.html" %}
{% block content %}
<div class="post-entry">
{% if post.plik1 %}
<p><a href="/PLIKI/{{post.id}}/plik.txt">dane</a></p>
{% endif %}

{% if post.smiles %}
<div style="margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px;">
  <h3>Cząsteczka: {{ post.smiles }}</h3>
  <div id="smilesViewer" style="width:500px; height:400px;"></div>
  <p id="smilesError" class="text-danger"></p>
</div>

<script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>
<script>
fetch("{% url 'smiles3de' %}?smiles={{ post.smiles|urlencode }}")
    .then(function(res) { return res.json(); })
    .then(function(data) {
        var viewerDiv = document.getElementById("smilesViewer");
        if (data.error) {
            document.getElementById("smilesError").textContent = "Błąd: " + data.error;
            return;
        }
        var viewer = $3Dmol.createViewer(viewerDiv, { backgroundColor: "white" });
        viewer.addModel(data.mol_block, "mol");
        viewer.setStyle({}, { stick: {}, sphere: { scale: 0.3 } });
        viewer.zoomTo();
        viewer.render();
    });
</script>
{% endif %}

<p><a href="{% url 'post_edit' post.pk %}">+ Edit Blog Post</a></p>
<p><a href="{% url 'post_delete' post.pk %}">+ Delete Blog Post</a></p>
</div>
{% endblock content %}
